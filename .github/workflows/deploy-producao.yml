name: Deploy Produção Nic-Labs

on:
  push:
    branches:
      - main # Dispara sempre que houver um push ou merge na main

jobs:
  deploy:
    runs-on: self-hosted # Força a execução no servidor da Nic-Labs

    steps:
      - name: Tratar permissões (Git Safe Directory)
        run: |
          git config --global --add safe.directory /opt/nic-labs/core/sistema-de-gestao

      - name: Atualizar o código-fonte (Git Pull)
        run: |
          cd /opt/nic-labs/core/sistema-de-gestao
          git fetch --all
          git reset --hard origin/main

      - name: Reconstruir e reiniciar contêineres (Docker Compose)
        run: |
          cd /opt/nic-labs/core
          # Utilizamos o arquivo de segredos específico para evitar o erro de permissão no .env do root
          docker compose --env-file secrets/gestao_backend.env build gestao_backend gestao_frontend
          docker compose --env-file secrets/gestao_backend.env up -d gestao_backend gestao_frontend
          
          # Limpeza do disco
          docker image prune -f
